<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Technological World Mobile</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        color: #e8f6ff;
        background:
          radial-gradient(circle at 15% 20%, rgba(17, 183, 255, 0.18), transparent 22%),
          radial-gradient(circle at 85% 18%, rgba(56, 209, 255, 0.16), transparent 24%),
          linear-gradient(160deg, #05101d 0%, #071625 38%, #04111d 100%);
      }
      .shell {
        width: min(92vw, 420px);
        padding: 28px;
        border-radius: 26px;
        border: 1px solid rgba(129, 223, 255, 0.16);
        background: rgba(10, 24, 40, 0.9);
        box-shadow: 0 18px 44px rgba(1, 6, 14, 0.32);
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }
      p {
        margin: 0;
        color: #9dbccf;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>Technological World</h1>
      <p>Abriendo la plataforma comercial segura en modo movil.</p>
    </main>
  </body>
  </html>
